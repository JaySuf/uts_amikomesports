<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Amikom Esports</title>
    <meta name="description" content="Login ke dashboard Amikom Esports buat pantau statistik tim kamu dan atur jadwal match.">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="container navbar">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="Amikom Esports Logo" style="height: 40px; width: auto; margin-right: 8px;">
                <span>Amikom<span class="text-gradient">Esports</span></span>
            </a>

            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About Us</a>
                <a href="contact.html" class="nav-link">Contact Us</a>
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="signin.html" class="nav-link active">Login</a>
                <a href="signup.html" class="nav-link">Daftar</a>

                <div class="nav-actions-mobile" style="display: none;">
                    <a href="signup.html" class="btn btn-primary" style="width: 100%;">Mulai Main</a>
                </div>
            </nav>

            <div class="nav-actions">
                <button id="theme-toggle" class="theme-toggle-btn" title="Ubah Tema">
                    <i class="ri-sun-line"></i>
                </button>
                <a href="signup.html" class="btn btn-primary">Mulai Main</a>
            </div>

            <button class="hamburger" aria-label="Alihkan Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-glow-1"></div>
        <div class="auth-glow-2"></div>

        <div class="glass-card auth-card animate-fade-in-up">
            <div class="auth-header">
                <h1>Welcome Back, Player!</h1>
                <p>Masukin email sama password kamu buat masuk ke dashboard tim.</p>
            </div>

            <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">

                <div class="form-group">
                    <label for="signin-email">Alamat Email</label>
                    <div class="input-wrapper">
                        <i class="ri-mail-line"></i>
                        <input type="email" id="signin-email" class="form-input" placeholder="email.kamu@domain.com" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label for="signin-password">Password</label>
                    <div class="input-wrapper">
                        <i class="ri-lock-line"></i>
                        <input type="password" id="signin-password" class="form-input" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required autocomplete="current-password">
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember-me">
                        <span>Ingetin gue di PC ini</span>
                    </label>
                    <a href="#" class="auth-link">Lupa password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                    Login ke Dashboard
                </button>
            </form>

            <div class="auth-divider">atau login cepet pake</div>

            <div class="social-auth-grid">
                <button class="btn-social" onclick="window.location.href='dashboard.html';" title="Login via Google">
                    <i class="ri-google-fill" style="color: #EA4335;"></i>
                </button>
                <button class="btn-social" onclick="window.location.href='dashboard.html';" title="Login via GitHub">
                    <i class="ri-github-fill"></i>
                </button>
                <button class="btn-social" onclick="window.location.href='dashboard.html';" title="Login via Apple">
                    <i class="ri-apple-fill"></i>
                </button>
            </div>

            <p style="text-align: center; margin-top: 32px; color: var(--text-secondary); font-size: 0.9rem;">
                Belum punya skuad? <a href="signup.html" class="auth-link">Daftar sekarang</a>
            </p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
